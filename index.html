<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ArconLoader</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<style>
:root{
  --bg:#050812;
  --panel:#0b1224;
  --border:#1d2b55;
  --glow:#4c6fff;
  --text:#e6ebff;
  --muted:#9aa6ff;
}
*{box-sizing:border-box;font-family:Inter,system-ui}
body{
  margin:0;background:radial-gradient(circle at top,#0c1430,#050812);
  color:var(--text);
}
header{
  display:flex;align-items:center;gap:16px;
  padding:16px 24px;
}
.logo{
  font-weight:800;font-size:20px;cursor:pointer;
}
.nav a{
  margin-right:16px;cursor:pointer;color:var(--muted);
}
.nav a:hover{color:#fff;text-shadow:0 0 10px var(--glow)}
button{
  background:#0d1635;border:1px solid var(--border);
  color:#fff;padding:8px 14px;border-radius:10px;
  cursor:pointer;
}
button:hover{box-shadow:0 0 15px var(--glow)}

.page{display:none;padding:24px}
.page.active{display:block}

.card{
  background:linear-gradient(180deg,#0d1635,#070b18);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  transition:.3s;
}
.card:hover{box-shadow:0 0 20px var(--glow)}

.stat-box{
  width:260px;text-align:center;
}
.stat-number{
  font-size:42px;font-weight:800;
}

.products{
  display:flex;gap:20px;flex-wrap:wrap;margin-top:20px;
}
.product{
  width:260px;
}
.product img{
  width:100%;height:110px;object-fit:contain;
}
.status-dot{
  width:10px;height:10px;border-radius:50%;
  animation:pulse 3s infinite;
}
.online{background:#00ff88}
.offline{background:#ff4444}

@keyframes pulse{
  0%{opacity:.3}
  50%{opacity:1}
  100%{opacity:.3}
}

.modal{
  position:fixed;inset:0;background:#000a;
  display:none;align-items:center;justify-content:center;
}
.modal.show{display:flex}
.modal-box{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px;
  width:420px;
  animation:slideUp .4s;
}
@keyframes slideUp{
  from{transform:translateY(40px);opacity:0}
  to{transform:none;opacity:1}
}

.close{
  float:right;cursor:pointer;color:#aaa;
}
.close:hover{color:#fff}

footer{
  text-align:center;padding:14px;
  color:#5560aa;font-size:12px;
}
</style>
</head>

<body>

<header>
  <div class="logo" onclick="go('home')">ArconLoader</div>
  <div class="nav">
    <a onclick="go('home')">🏠 Home</a>
    <a onclick="go('products')">📦 Products</a>
    <a onclick="go('status')">📡 Status</a>
  </div>
  <button id="logoutBtn" onclick="logout()" disabled>Logout</button>
</header>

<!-- HOME -->
<div class="page active" id="home">
  <div class="card stat-box">
    <div>Active Users</div>
    <div class="stat-number" id="users">—</div>
  </div>
</div>

<!-- PRODUCTS -->
<div class="page" id="products">
  <h2>Products</h2>
  <div class="products">
    <div class="card product">
      <img src="https://ih1.redbubble.net/image.346295871.1819/raf,360x360,075,t,fafafa:ca443f4786.u3.jpg">
      <h3>Rust</h3>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="status-dot online" id="rustStatus"></div>
        <span id="rustText">Online</span>
      </div>
      <button onclick="openKeys()">Manage 🔑</button>
    </div>
  </div>
</div>

<!-- STATUS -->
<div class="page" id="status">
  <h2>Status</h2>
  <div class="card">Auth Server — Online <span class="status-dot online"></span></div>
  <br>
  <div class="card">Loader API — Online <span class="status-dot online"></span></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <span class="close" onclick="closeModal()">✕</span>
    <h3>Rust Keys</h3>
    <div id="keyList"></div>
  </div>
</div>

<footer>© 2026 ArconLoader™</footer>

<script>
// 🔥 FIREBASE CONFIG (PASTE YOURS)
firebase.initializeApp({
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
});

const db = firebase.firestore();

function go(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.getElementById(p).classList.add('active');
}

function logout(){
  if(!firebase.auth().currentUser) return;
  firebase.auth().signOut();
  document.getElementById("logoutBtn").disabled=true;
}

db.doc("stats/global").onSnapshot(d=>{
  document.getElementById("users").innerText=d.data().activeUsers;
});

db.doc("products/rust").onSnapshot(d=>{
  const s=d.data().status;
  document.getElementById("rustText").innerText=s;
  document.getElementById("rustStatus").className="status-dot "+(s==="online"?"online":"offline");
});

function openKeys(){
  const list=document.getElementById("keyList");
  list.innerHTML="Loading...";
  db.collection("keys").where("product","==","rust").get().then(q=>{
    list.innerHTML="";
    q.forEach(doc=>{
      list.innerHTML+=`<div>${doc.id}</div>`;
    });
  });
  document.getElementById("modal").classList.add("show");
}
function closeModal(){
  document.getElementById("modal").classList.remove("show");
}
</script>

</body>
</html>
