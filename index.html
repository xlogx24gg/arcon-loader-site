<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ArconLoader</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<style>
:root{
  --bg:#050812;
  --panel:#0b1224;
  --border:#1d2b55;
  --glow:#4c6fff;
  --text:#e6ebff;
  --muted:#9aa6ff;
  --accent:#4c6fff;
}
*{box-sizing:border-box;font-family:Inter,system-ui;margin:0;padding:0;user-select:none;}
body{
  background:radial-gradient(circle at top,#0c1430,#050812);
  background-size:cover;
  background-attachment:fixed;
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 24px;
}
.logo{
  font-weight:800;font-size:22px;cursor:pointer;
  background: linear-gradient(90deg, #4c6fff, #38ffe0, #b95bff);
  -webkit-background-clip: text;
  color: transparent;
  transition: .3s;
}
.logo:hover{ text-shadow:0 0 15px var(--glow); }
.nav a{
  margin-right:16px;cursor:pointer;color:var(--muted);
  transition:.2s;
}
.nav a:hover{color:#fff;text-shadow:0 0 15px var(--glow);}
button{
  background:linear-gradient(90deg, #4c6fff, #38ffe0);
  border:none;color:#050812;font-weight:600;
  padding:10px 16px;border-radius:12px;
  cursor:pointer;transition:.3s;box-shadow:0 0 5px #4c6fff66;
}
button:hover{box-shadow:0 0 15px var(--glow);}
.page{display:none;padding:24px;transition:.3s;}
.page.active{display:block;}

.card{
  background:linear-gradient(180deg,#0d1635,#070b18);
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px;
  transition:.4s;
}
.card:hover{box-shadow:0 0 25px var(--glow); transform: translateY(-3px);}

.stat-box{width:260px;text-align:center;margin:60px auto;}
.stat-number{font-size:42px;font-weight:800;}

.products{
  display:flex;gap:20px;flex-wrap:wrap;margin-top:20px;justify-content:center;
}
.product{
  width:260px;display:flex;flex-direction:column;align-items:center;transition:.3s;
}
.product img{width:100%;height:110px;object-fit:contain;border-radius:10px;}
.status-container{display:flex;align-items:center;gap:8px;margin:8px 0;}
.status-dot{width:12px;height:12px;border-radius:50%;animation:pulse 2.5s infinite;}
.online{background:#00ff88;}
.offline{background:#ff4444;}
.product button{width:100%;margin-top:10px;font-weight:600;}

@keyframes pulse{0%{opacity:.3}50%{opacity:1}100%{opacity:.3}}

.modal{
  position:fixed;inset:0;background:#000a;
  display:none;align-items:center;justify-content:center;z-index:10;
}
.modal.show{display:flex;}
.modal-box{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px;
  width:420px;
  animation:slideUp .4s;
}
@keyframes slideUp{from{transform:translateY(40px);opacity:0} to{transform:none;opacity:1}}
.close{float:right;cursor:pointer;color:#aaa;font-size:18px;}
.close:hover{color:#fff;}

.watermark{
  position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
  font-size:12px;color:rgba(255,255,255,0.15);
  pointer-events:none;
}

.loader{
  position:fixed;inset:0;background:transparent;display:flex;align-items:center;justify-content:center;z-index:50;display:none;
}
.loader.show{display:flex;}
.loader-circle{
  width:50px;height:50px;border:6px solid rgba(255,255,255,0.2);
  border-top-color: var(--glow);
  border-radius:50%;
  animation:spin 0.5s linear infinite;
}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

.account-btn{background:none;border:none;color:var(--text);cursor:pointer;font-weight:600;}
.account-menu{
  position:absolute;top:60px;right:20px;background:var(--panel);padding:12px;border-radius:12px;display:none;flex-direction:column;gap:8px;box-shadow:0 0 15px var(--glow);z-index:20;
}
.account-menu.show{display:flex;}
.status-page .card{margin-top:20px;display:flex;justify-content:space-between;align-items:center;gap:8px;transition:.3s;}
.status-dot.flash{animation:flash 1.5s infinite;}
@keyframes flash{0%,50%,100%{opacity:1;}25%,75%{opacity:0.2;}}
.login-page{
  max-width:400px;margin:50px auto;padding:20px;background:var(--panel);border-radius:16px;
  display:flex;flex-direction:column;gap:12px;
}
.login-page input{padding:12px;border-radius:8px;border:none;background:rgba(0,0,0,.3);color:var(--text);}
.login-page button{margin-top:8px;}
</style>
</head>

<body>

<header>
  <div class="logo" onclick="go('home')">ArconLoader</div>
  <div class="nav">
    <a id="homeLink" onclick="go('home')">🏠 Home</a>
    <a id="productsLink" onclick="go('products')">📦 Products</a>
    <a id="statusLink" onclick="go('status')">📡 Status</a>
  </div>
  <div>
    <button id="accountBtn" class="account-btn">Sign In ⚡</button>
    <button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
  </div>
  <div id="accountMenu" class="account-menu"></div>
</header>

<div class="loader" id="loader"><div class="loader-circle"></div></div>

<!-- HOME -->
<div class="page active" id="home">
  <div class="card stat-box">
    <h2>Active Users</h2>
    <div class="stat-number" id="users">—</div>
  </div>
</div>

<!-- PRODUCTS -->
<div class="page" id="products">
  <h2>Products</h2>
  <div class="products">
    <div class="card product">
      <img src="https://ih1.redbubble.net/image.346295871.1819/raf,360x360,075,t,fafafa:ca443f4786.u3.jpg">
      <h3>Rust</h3>
      <div class="status-container">
        <div class="status-dot online" id="rustStatus"></div>
        <span id="rustText">Online</span>
      </div>
      <button onclick="openKeys()">Manage 🔑</button>
    </div>
  </div>
</div>

<!-- STATUS -->
<div class="page status-page" id="status">
  <h2>Status</h2>
  <div class="card"><span>Auth Server — Online</span> <span class="status-dot flash online"></span></div>
  <div class="card"><span>Loader API — Online</span> <span class="status-dot flash online"></span></div>
</div>

<!-- KEYS MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <span class="close" onclick="closeModal()">✕</span>
    <h3>Rust Keys</h3>
    <div id="keyList">Loading...</div>
  </div>
</div>

<!-- LOGIN PAGE -->
<div class="page" id="loginPage">
  <div class="login-page">
    <h2>Sign In</h2>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPass" placeholder="Password">
    <button onclick="login()">Sign In</button>
    <button onclick="showRegister()">Create Account</button>
    <button onclick="go('home')">Cancel</button>
  </div>
</div>

  <!-- REGISTER PAGE -->
<div class="page" id="registerPage">
  <div class="login-page">
    <h2>Create Account</h2>
    <input type="email" id="regEmail" placeholder="Email">
    <input type="password" id="regPass" placeholder="Password">
    <input type="password" id="regPassConfirm" placeholder="Confirm Password">
    <button onclick="register()">Register</button>
    <button onclick="go('loginPage')">Back to Sign In</button>
  </div>
</div>

<div class="watermark">© 2026 ArconLoader™</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAn4MmK4KXuV3qW6SgmjCHVlDEDZ2ku9Wc",
  authDomain: "arconloader.firebaseapp.com",
  projectId: "arconloader",
  storageBucket: "arconloader.firebasestorage.app",
  messagingSenderId: "931229254243",
  appId: "1:931229254243:web:aee9b1fd143cd3976c6e56"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// Page navigation with loader
function go(page){
  const loader = document.getElementById("loader");
  loader.classList.add("show");
  setTimeout(()=>{
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(page).classList.add('active');
    loader.classList.remove("show");
  },300);
}

// Auth handling
auth.onAuthStateChanged(user=>{
  const loggedIn = !!user;
  document.getElementById("logoutBtn").style.display = loggedIn ? 'inline-block' : 'none';
  document.getElementById("productsLink").style.display = loggedIn ? 'inline' : 'none';
  document.getElementById("homeLink").style.display = loggedIn ? 'inline' : 'none';
  const menu = document.getElementById("accountMenu");
  if(loggedIn){
    document.getElementById("accountBtn").innerText = "Account ⚡";
    menu.innerHTML = `<div>Email: ${user.email || 'Anonymous'}</div>`;
    menu.innerHTML += `<button onclick="logout()">Logout</button>`;
  } else {
    document.getElementById("accountBtn").innerText = "Sign In ⚡";
    menu.innerHTML = `<button onclick="go('loginPage')">Sign In</button>`;
  }
});

// Account button toggle
document.getElementById("accountBtn").addEventListener("click",()=>{
  document.getElementById("accountMenu").classList.toggle("show");
});

// Logout
function logout(){
  auth.signOut().catch(console.error);
}

// Active Users
db.collection("products").doc("rust")
  .collection("stats").doc("global")
  .onSnapshot(doc=>{
    const data = doc.data();
    document.getElementById("users").innerText = data?.activeUsers ?? "—";
});

// Rust status
db.collection("products").doc("rust")
  .onSnapshot(doc=>{
    const s = doc.data()?.status || "offline";
    document.getElementById("rustText").innerText = s.charAt(0).toUpperCase() + s.slice(1);
    document.getElementById("rustStatus").className = "status-dot "+(s==="online"?"online":"offline");
});

// Keys modal
function openKeys(){
  const list = document.getElementById("keyList");
  list.innerHTML = "Loading...";
  db.collection("products").doc("rust").collection("keys")
    .get()
    .then(snap=>{
      list.innerHTML="";
      if(snap.empty){ list.innerHTML="<div>No keys found</div>"; return; }
      snap.forEach(doc=>{
        const val = doc.data()?.value || "—";
        list.innerHTML += `<div><strong>${doc.id}</strong>: ${val}</div>`;
      });
    })
    .catch(err=>{
      list.innerHTML="<div>Error loading keys</div>";
      console.error(err);
    });
  document.getElementById("modal").classList.add("show");
}
function closeModal(){ document.getElementById("modal").classList.remove("show"); }

// Login page
function login(){
  const email = document.getElementById("loginEmail").value;
  const pass = document.getElementById("loginPass").value;
  if(!email || !pass) return alert("Enter email and password");
  auth.signInWithEmailAndPassword(email, pass)
      .then(()=>go('home'))
      .catch(err=>alert(err.message));
}

  // Show registration page
function showRegister(){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('registerPage').classList.add('active');
}

// Register new user
function register(){
  const email = document.getElementById('regEmail').value;
  const pass = document.getElementById('regPass').value;
  const confirm = document.getElementById('regPassConfirm').value;

  if(!email || !pass || !confirm){
    alert("All fields are required!");
    return;
  }
  if(pass !== confirm){
    alert("Passwords do not match!");
    return;
  }

  auth.createUserWithEmailAndPassword(email, pass)
    .then(userCredential => {
      alert("Account created successfully! You are now signed in.");
      go('home');
    })
    .catch(error => {
      alert("Error: " + error.message);
    });
}
</script>
</body>
</html>
