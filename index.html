<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ArconLoader Debug</title>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body>

<h1>ArconLoader Debug Page</h1>

<div>
  <button id="logoutBtn" onclick="logout()" disabled>Logout</button>
</div>

<h2>Status</h2>
<div>Rust Status: <span id="rustStatus">?</span></div>

<h2>Active Users</h2>
<div id="users">Loading...</div>

<h2>Keys</h2>
<div id="keyList">Loading...</div>

<script>
// Initialize Firebase
const firebaseConfig = {
  apiKey: "AIzaSyAn4MmK4KXuV3qW6SgmjCHVlDEDZ2ku9Wc",
  authDomain: "arconloader.firebaseapp.com",
  projectId: "arconloader",
  storageBucket: "arconloader.firebasestorage.app",
  messagingSenderId: "931229254243",
  appId: "1:931229254243:web:aee9b1fd143cd3976c6e56"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// Enable logout button if logged in
auth.onAuthStateChanged(user => {
  document.getElementById("logoutBtn").disabled = !user;
  console.log("User state changed:", user);
});

// Logout function
function logout() {
  if(!auth.currentUser) { alert("No user logged in"); return; }
  auth.signOut()
    .then(()=>alert("Logged out"))
    .catch(err => console.error("Logout error:", err));
}

// Rust Status
db.collection("products").doc("rust").get()
  .then(doc=>{
    if(doc.exists){
      const status = doc.data()?.status || "offline";
      document.getElementById("rustStatus").innerText = status;
      console.log("Rust Status:", status);
    } else {
      console.log("Rust document missing!");
      document.getElementById("rustStatus").innerText = "—";
    }
  })
  .catch(err=>console.error("Rust status error:", err));

// Active Users
db.collection("products").doc("rust")
  .collection("stats").doc("global").get()
  .then(doc=>{
    if(doc.exists){
      const users = doc.data()?.activeUsers;
      document.getElementById("users").innerText = users !== undefined ? users : "—";
      console.log("Active Users:", users);
    } else {
      console.log("Global stats doc missing!");
      document.getElementById("users").innerText = "—";
    }
  })
  .catch(err=>console.error("Active Users error:", err));

// Keys
db.collection("products").doc("rust")
  .collection("keys").get()
  .then(snapshot=>{
    const list = document.getElementById("keyList");
    list.innerHTML = "";
    if(snapshot.empty){ 
      list.innerHTML = "No keys found"; 
      console.log("Keys collection empty");
      return;
    }
    snapshot.forEach(doc=>{
      const val = doc.data()?.value || "—";
      list.innerHTML += `<div>${doc.id}: ${val}</div>`;
      console.log("Key:", doc.id, val);
    });
  })
  .catch(err=>console.error("Keys error:", err));
</script>
</body>
</html>
