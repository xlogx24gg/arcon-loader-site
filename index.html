<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ArconLoader</title>

<style>
:root{
  --bg:#0b0f1a;
  --card:#12172a;
  --accent:#6f7cff;
  --text:#e6e9ff;
  --muted:#9aa0c7;
  --glow:0 0 18px rgba(111,124,255,.45);
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:Segoe UI,system-ui;
  background:radial-gradient(circle at top,#141a33,var(--bg));
  color:var(--text);
}

nav{
  position:fixed;
  top:0;left:0;right:0;
  height:64px;
  background:rgba(10,15,30,.85);
  backdrop-filter:blur(12px);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
  z-index:10;
}

.logo{
  font-size:20px;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
}
.logo:hover{ text-shadow:var(--glow); }

nav button{
  background:none;
  border:none;
  color:var(--text);
  margin-left:16px;
  cursor:pointer;
  opacity:.8;
}
nav button:hover{opacity:1;text-shadow:var(--glow)}

main{
  max-width:1100px;
  margin:110px auto 80px;
  padding:0 30px;
}

h1{margin-bottom:10px}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:24px;
  margin-top:30px;
}

.card{
  background:var(--card);
  border-radius:14px;
  padding:22px;
  position:relative;
  transition:.25s;
  border:1px solid rgba(255,255,255,.05);
}
.card:hover{
  transform:translateY(-5px);
  box-shadow:var(--glow);
}

.status-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#2cff8f;
  display:inline-block;
  margin-right:8px;
  animation:pulse 5s infinite;
}

@keyframes pulse{
  0%{opacity:.3}
  50%{opacity:1}
  100%{opacity:.3}
}

.btn{
  margin-top:14px;
  padding:10px 16px;
  background:linear-gradient(45deg,var(--accent),#8f9bff);
  border-radius:10px;
  color:#000;
  font-weight:600;
  cursor:pointer;
  border:none;
}
.btn:hover{box-shadow:var(--glow)}

footer{
  position:fixed;
  bottom:10px;
  width:100%;
  text-align:center;
  font-size:12px;
  opacity:.4;
}

/* POPUP */
#popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:20;
}

.popup-box{
  background:var(--card);
  padding:30px;
  border-radius:16px;
  width:420px;
  max-width:90%;
}

.key-list{
  margin-top:14px;
  font-family:monospace;
  font-size:14px;
  line-height:1.6;
}
</style>
</head>

<body>

<nav>
  <div class="logo" onclick="location.reload()">ArconLoader</div>
  <div>
    <button onclick="openPopup()">Manage</button>
  </div>
</nav>

<main>
<h1>Welcome to ArconLoader</h1>
<p class="muted">Secure loader dashboard powered by Firebase.</p>

<div class="cards">
  <div class="card">
    <h2 id="productName">Loading…</h2>
    <p><span class="status-dot"></span><span id="productStatus">Checking status…</span></p>
    <button class="btn" onclick="openPopup()">Manage</button>
  </div>
</div>
</main>

<footer>© 2026 ArconLoader™</footer>

<!-- POPUP -->
<div id="popup">
  <div class="popup-box">
    <h3>Available Keys</h3>
    <div class="key-list" id="keysBox">Loading…</div>
    <button class="btn" onclick="closePopup()">Close</button>
  </div>
</div>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
/* =====================
   🔧 PASTE YOUR CONFIG
   ===================== */
const firebaseConfig = {
  apiKey: "AIzaSyAn4MmK4KXuV3qW6SgmjCHVlDEDZ2ku9Wc",
  authDomain: "arconloader.firebaseapp.com",
  projectId: "arconloader",
  storageBucket: "arconloader.firebasestorage.app",
  messagingSenderId: "931229254243",
  appId: "1:931229254243:web:aee9b1fd143cd3976c6e56"
};
  
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

auth.signInAnonymously();

/* =====================
   LOAD PRODUCT
   ===================== */
db.collection("products").doc("rust").get().then(doc=>{
  const data = doc.data();
  document.getElementById("productName").innerText = data.name;
  document.getElementById("productStatus").innerText = data.status;
});

/* =====================
   POPUP / KEYS
   ===================== */
function openPopup(){
  document.getElementById("popup").style.display="flex";
  const box = document.getElementById("keysBox");
  box.innerText="Loading…";

  db.collection("products").doc("rust").collection("keys").get().then(snap=>{
    let out="";
    snap.forEach(d=>{
      out += d.data().value + "\n";
    });
    box.innerText = out || "No keys available";
  });
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
