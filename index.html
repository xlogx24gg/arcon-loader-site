<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ArconLoader Debug</title>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body>

<h1>ArconLoader Debug</h1>

<div>
  <button id="logoutBtn" onclick="logout()" disabled>Logout</button>
</div>

<h2>Active Users</h2>
<div id="users">Loading...</div>

<h2>Keys</h2>
<div id="keyList">Loading...</div>

<h2>Status</h2>
<div>
  Rust Status: <span id="rustStatus">?</span>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAn4MmK4KXuV3qW6SgmjCHVlDEDZ2ku9Wc",
  authDomain: "arconloader.firebaseapp.com",
  projectId: "arconloader",
  storageBucket: "arconloader.firebasestorage.app",
  messagingSenderId: "931229254243",
  appId: "1:931229254243:web:aee9b1fd143cd3976c6e56"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// Enable logout button if user is logged in
auth.onAuthStateChanged(user => {
  document.getElementById("logoutBtn").disabled = !user;
});

// Logout function
function logout() {
  if(!auth.currentUser) { alert("No user logged in"); return; }
  auth.signOut().then(()=>alert("Logged out")).catch(console.error);
}

// Active Users from subcollection
db.collection("products").doc("rust").collection("stats").doc("global").onSnapshot(doc => {
  const data = doc.data();
  console.log("Active Users Data:", data);
  if(data && data.activeUsers !== undefined) {
    document.getElementById("users").innerText = data.activeUsers;
  } else {
    document.getElementById("users").innerText = "—";
  }
});

// Keys from subcollection
db.collection("products").doc("rust").collection("keys").get().then(snapshot => {
  const list = document.getElementById("keyList");
  list.innerHTML = "";
  snapshot.forEach(doc => {
    const val = doc.data()?.value || "—";
    list.innerHTML += `<div>${doc.id}: ${val}</div>`;
  });
}).catch(console.error);

// Rust status
db.collection("products").doc("rust").onSnapshot(doc => {
  const status = doc.data()?.status || "offline";
  document.getElementById("rustStatus").innerText = status;
});
</script>

</body>
</html>
